<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="description" content="TPQI 팀플 성향 판별기">
  <title>TPQI 팀플 성향 판별기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --bg-soft: #fbfbfd;
      --surface: rgba(255, 255, 255, .82);
      --surface-strong: #ffffff;
      --line: rgba(0, 0, 0, .08);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --muted-strong: #424245;
      --blue: #0071e3;
      --blue-soft: rgba(0, 113, 227, .12);
      --green: #34c759;
      --orange: #ff9f0a;
      --red: #ff3b30;
      --cyan: #00a7d8;
      --shadow: 0 24px 70px rgba(0, 0, 0, .10);
      --radius: 8px;
      --ease: cubic-bezier(.2, .8, .2, 1);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      background:
        linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #eceef2 100%);
      color: var(--text);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .stage,
    .side {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .stage {
      min-height: calc(100vh - 42px);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(145deg, #111113, #3a3a3c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .16), 0 10px 22px rgba(0, 0, 0, .18);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 3.2vw, 32px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .count-badge {
      min-width: 74px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      color: var(--muted-strong);
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
    }

    .screen-stack {
      position: relative;
      min-height: 620px;
    }

    .screen {
      display: none;
      padding: 24px;
      min-height: 100%;
      animation: liftIn .42s var(--ease) both;
    }

    .screen.active {
      display: block;
    }

    @keyframes liftIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(.995);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hero-copy {
      max-width: 680px;
      margin: 16px 0 26px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
    }

    .headline {
      margin: 0;
      font-size: clamp(34px, 7vw, 66px);
      line-height: 1.03;
      letter-spacing: 0;
      max-width: 720px;
    }

    .subcopy {
      margin: 14px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.55;
    }

    .start-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 12px;
      align-items: end;
      max-width: 740px;
      margin-top: 32px;
    }

    .field label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      color: var(--text);
      padding: 0 16px;
      outline: none;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
    }

    .field input:focus {
      border-color: rgba(0, 113, 227, .55);
      box-shadow: 0 0 0 4px var(--blue-soft);
      background: #fff;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn,
    .choice-btn {
      min-height: 52px;
      border-radius: var(--radius);
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-weight: 750;
      transition: transform .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 14px 28px rgba(0, 113, 227, .24);
      padding: 0 18px;
    }

    .secondary-btn,
    .ghost-btn {
      padding: 0 16px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .ghost-btn {
      background: transparent;
      box-shadow: none;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .ghost-btn:active,
    .choice-btn:active {
      transform: scale(.985);
    }

    .mini-actions,
    .result-actions,
    .team-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .mini-actions {
      margin-top: 22px;
    }

    .progress-wrap {
      display: grid;
      gap: 14px;
      margin-bottom: 32px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0, 0, 0, .08);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width .34s var(--ease);
    }

    .question-panel {
      min-height: 390px;
      display: grid;
      align-content: center;
      gap: 24px;
    }

    .axis-chip {
      width: fit-content;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 750;
    }

    .question-text {
      margin: 0;
      max-width: 780px;
      font-size: clamp(28px, 5.7vw, 52px);
      line-height: 1.13;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 720px;
    }

    .choice-btn {
      min-height: 78px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 19px;
    }

    .choice-btn:hover,
    .secondary-btn:hover,
    .ghost-btn:hover {
      border-color: rgba(0, 113, 227, .34);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .08);
    }

    .choice-btn.selected {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .result-hero {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .type-code {
      display: inline-flex;
      width: fit-content;
      min-width: 116px;
      min-height: 58px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: var(--radius);
      background: #111113;
      color: #fff;
      font-size: 30px;
      font-weight: 850;
      letter-spacing: .08em;
      box-shadow: 0 16px 36px rgba(0, 0, 0, .2);
    }

    .result-hero h2,
    .team-report h2 {
      margin: 0;
      font-size: clamp(30px, 5.4vw, 52px);
      line-height: 1.08;
      letter-spacing: 0;
      word-break: keep-all;
    }

    .result-hero p,
    .team-report p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      word-break: keep-all;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .insight,
    .axis-row,
    .member-row,
    .empty {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .74);
    }

    .insight {
      padding: 16px;
    }

    .insight span,
    .axis-row small,
    .member-row small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      margin-bottom: 6px;
    }

    .insight strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .axis-list,
    .member-list {
      display: grid;
      gap: 10px;
      margin: 18px 0 0;
    }

    .axis-row {
      padding: 14px;
    }

    .axis-head,
    .member-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .axis-head strong,
    .member-head strong {
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
    }

    .axis-head b,
    .member-head b {
      font-size: 14px;
      color: var(--muted-strong);
      white-space: nowrap;
    }

    .bar-track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: var(--blue);
      transition: width .45s var(--ease);
    }

    .axis-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }

    .side {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .side-section {
      display: grid;
      gap: 12px;
    }

    .side-section h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .side-section p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .team-report {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 22px;
      align-items: center;
      margin: 6px 0 24px;
    }

    .rate-ring {
      --rate: 0%;
      width: 200px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #fff 0 58%, transparent 59%),
        conic-gradient(var(--green) var(--rate), rgba(0, 0, 0, .08) 0);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .75);
    }

    .rate-ring strong {
      font-size: 42px;
      line-height: 1;
      letter-spacing: 0;
    }

    .rate-ring span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-align: center;
      margin-top: 6px;
    }

    .member-row {
      padding: 14px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 20;
      width: min(420px, calc(100% - 32px));
      min-height: 48px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: rgba(29, 29, 31, .9);
      color: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 14px);
      transition: opacity .24s var(--ease), transform .24s var(--ease);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 920px) {
      .app {
        display: block;
        padding: 0;
      }

      .stage,
      .side {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .stage {
        min-height: auto;
      }

      .screen-stack {
        min-height: 570px;
      }

      .side {
        position: static;
        border-top: 0;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        padding: 14px;
      }

      .brand {
        align-items: flex-start;
      }

      .mark {
        width: 34px;
        height: 34px;
        font-size: 14px;
      }

      .brand p {
        display: none;
      }

      .screen {
        padding: 22px 14px 26px;
      }

      .hero-copy {
        margin-top: 4px;
      }

      .start-grid,
      .choice-grid,
      .insight-grid,
      .team-report {
        grid-template-columns: 1fr;
      }

      .question-panel {
        min-height: 430px;
        align-content: start;
        padding-top: 26px;
      }

      .question-text {
        font-size: clamp(29px, 9.4vw, 42px);
      }

      .choice-btn {
        min-height: 66px;
      }

      .rate-ring {
        width: min(200px, 64vw);
        justify-self: center;
      }

      .result-actions,
      .team-actions,
      .mini-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .secondary-btn,
      .ghost-btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="TPQI 진단">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">TP</div>
          <div>
            <h1>TPQI</h1>
            <p>팀플 성향 판별기</p>
          </div>
        </div>
        <div class="count-badge" id="teamCount">0명</div>
      </header>

      <div class="screen-stack">
        <section class="screen active" id="homeScreen">
          <div class="hero-copy">
            <p class="eyebrow">Team Project Quotient Index</p>
            <h2 class="headline">너의 팀플 유형은?</h2>
            <p class="subcopy">20개의 질문으로 팀플에서의 역할, 접근 방식, 작업 스타일, 소통 성향을 판별합니다.</p>
          </div>

          <form class="start-grid" id="startForm">
            <div class="field">
              <label for="nameInput">진단 대상 이름</label>
              <input id="nameInput" name="name" autocomplete="name" maxlength="18" placeholder="이름 입력">
            </div>
            <button class="primary-btn" type="submit">진단 시작</button>
          </form>

          <div class="mini-actions">
            <button class="secondary-btn" type="button" id="openTeamFromHome">팀 리포트</button>
            <button class="ghost-btn" type="button" id="clearAllFromHome">기록 초기화</button>
          </div>
        </section>

        <section class="screen" id="quizScreen">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="progressText">Q1 / 20</span>
              <span id="quizName">진단 중</span>
            </div>
            <div class="progress" aria-hidden="true">
              <div class="progress-bar" id="progressBar"></div>
            </div>
          </div>

          <div class="question-panel">
            <div class="axis-chip" id="axisChip">역할</div>
            <h2 class="question-text" id="questionText"></h2>
            <div class="choice-grid" aria-label="답변 선택">
              <button class="choice-btn" type="button" data-answer="true">예</button>
              <button class="choice-btn" type="button" data-answer="false">아니오</button>
            </div>
            <div class="mini-actions">
              <button class="ghost-btn" type="button" id="prevQuestion">이전</button>
            </div>
          </div>
        </section>

        <section class="screen" id="resultScreen">
          <div class="result-hero">
            <div class="type-code" id="resultCode">TPQI</div>
            <h2 id="resultName">진단 결과</h2>
            <p id="resultComment"></p>
          </div>

          <div class="insight-grid">
            <div class="insight">
              <span>진단 대상</span>
              <strong id="resultPerson"></strong>
            </div>
            <div class="insight">
              <span>처세술</span>
              <strong id="resultTip"></strong>
            </div>
          </div>

          <div class="axis-list" id="axisList"></div>

          <div class="result-actions">
            <button class="primary-btn" type="button" id="addMember">팀원 추가</button>
            <button class="secondary-btn" type="button" id="openTeamFromResult">팀 리포트</button>
          </div>
        </section>

        <section class="screen" id="teamScreen">
          <div class="team-report">
            <div class="rate-ring" id="rateRing">
              <div>
                <strong id="survivalRate">0%</strong>
                <span>생존 가능성</span>
              </div>
            </div>
            <div>
              <p class="eyebrow">우리 팀 최종 리포트</p>
              <h2 id="teamHeadline">팀원 분석 대기 중</h2>
              <p id="teamComment">팀원 2명 이상이면 최종 리포트가 완성됩니다.</p>
            </div>
          </div>

          <div class="member-list" id="memberList"></div>

          <div class="team-actions">
            <button class="primary-btn" type="button" id="addMemberFromTeam">팀원 추가</button>
            <button class="ghost-btn" type="button" id="clearAllFromTeam">기록 초기화</button>
          </div>
        </section>
      </div>
    </section>

    <aside class="side" aria-label="진단 기록">
      <section class="side-section">
        <h2>최근 진단</h2>
        <div class="member-list" id="sideMemberList"></div>
      </section>
    </aside>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const axes = [
      { key: "ROLE", title: "역할", aKorean: "주도형", aCode: "L", bKorean: "지원형", bCode: "S", color: "#0071e3" },
      { key: "APPROACH", title: "접근", aKorean: "기획형", aCode: "P", bKorean: "실행형", bCode: "E", color: "#34c759" },
      { key: "STYLE", title: "스타일", aKorean: "정밀형", aCode: "Q", bKorean: "속도형", bCode: "F", color: "#ff9f0a" },
      { key: "COMMUNICATION", title: "소통", aKorean: "공유형", aCode: "C", bKorean: "독립형", bCode: "I", color: "#00a7d8" }
    ];

    const questions = [
      { text: "회의에서 아무도 말을 안 하면 내가 먼저 꺼내는 편이다", axis: "ROLE", isA: true },
      { text: "팀 방향이 이미 정해져 있으면 굳이 바꾸려 하지 않는다", axis: "ROLE", isA: false },
      { text: "팀플에서 역할 분담을 내가 먼저 제안하는 편이다", axis: "ROLE", isA: true },
      { text: "팀 안에서 갈등이 생기면 중재보다 따르는 편이다", axis: "ROLE", isA: false },
      { text: "잘못된 방향으로 가고 있으면 참지 못하고 수정 의견을 낸다", axis: "ROLE", isA: true },
      { text: "일을 시작하기 전에 전체 흐름을 머릿속으로 정리하고 시작한다", axis: "APPROACH", isA: true },
      { text: "계획이 없어도 일단 시작하면 어떻게든 된다고 생각한다", axis: "APPROACH", isA: false },
      { text: "아이디어가 생기면 검토보다 바로 적용해보고 싶다", axis: "APPROACH", isA: false },
      { text: "팀플 초반에 역할, 일정, 규칙을 문서로 정리하고 싶다", axis: "APPROACH", isA: true },
      { text: "중간에 계획이 틀어지면 수정보다 그냥 진행하는 편이다", axis: "APPROACH", isA: false },
      { text: "제출하고 나서도 더 잘할 수 있었는데 싶어서 아쉬울 때가 많다", axis: "STYLE", isA: true },
      { text: "마감 시간만 지키면 퀄리티는 어느 정도 타협할 수 있다", axis: "STYLE", isA: false },
      { text: "폰트, 정렬, 간격 같은 디테일이 눈에 거슬리는 편이다", axis: "STYLE", isA: true },
      { text: "완성도보다 제출 여부가 더 중요하다고 생각한다", axis: "STYLE", isA: false },
      { text: "팀원 결과물을 보면 고치고 싶은 부분이 자연스럽게 보인다", axis: "STYLE", isA: true },
      { text: "내 파트가 조금이라도 진행되면 팀원들에게 바로 공유한다", axis: "COMMUNICATION", isA: true },
      { text: "완성본이 나오기 전까지는 중간 과정을 굳이 공유 안 한다", axis: "COMMUNICATION", isA: false },
      { text: "팀원이 어떻게 진행하는지 궁금해서 먼저 물어보는 편이다", axis: "COMMUNICATION", isA: true },
      { text: "모르는 게 생겨도 혼자 해결하고 나서 공유하는 편이다", axis: "COMMUNICATION", isA: false },
      { text: "팀 카톡방이 조용하면 내가 먼저 분위기를 만드는 편이다", axis: "COMMUNICATION", isA: true }
    ];

    const typeCopy = {
      LPQC: ["팀플의 교과서형", "이끌고, 기획하고, 꼼꼼하고, 소통까지. 팀플의 로망", "팀원들 의견도 가끔 들어주세요. 당신만 완벽합니다."],
      LPQI: ["독불장군 완벽주의형", "완벽한데 혼자 함. 팀원들 본의 아니게 버스 탄 나쁜 놈 됨", "공유 한 번만 더 해주세요. 팀원들도 참여하고 싶어요."],
      LPFC: ["불도저형", "주도적으로 빠르게 이끌며 소통하는 돌격대장", "속도 줄이고 팀원 챙기면 최고의 팀장입니다."],
      LPFI: ["개인활동형", "빠르게 혼자 다 해버림. 팀플인지 개인플인지 모호", "팀원한테 일 나눠주는 연습을 해보세요."],
      LEQC: ["실행하는 리더형", "실행력과 꼼꼼함을 갖춘 소통형 리더", "기획도 조금만 하면 완벽한 리더가 됩니다."],
      LEQI: ["혼자 꼼꼼히 다 하는형", "혼자 꼼꼼하게 다 해오는 무언의 리더", "결과 공유 타이밍을 조금만 앞당겨 보세요."],
      LEFC: ["빠르고 시끄러운 실행파", "일단 하고 바로 공유. 팀플계의 에너자이저", "이 속도 유지하세요. 팀플계의 보물입니다."],
      LEFI: ["조용한 돌격대장형", "말없이 빠르게 혼자 처리. 결과로 말하는 타입", "중간 공유만 해줘도 팀원들이 엄청 좋아할 거예요."],
      SPQC: ["숨은 MVP형", "지원하면서 꼼꼼하고 소통까지. 팀플의 숨은 MVP", "앞에 좀 나서도 됩니다. 충분히 자격 있어요."],
      SPQI: ["묵묵한 완벽주의형", "말없이 완벽하게 처리. 있는지도 모르다가 결과로 놀람", "중간에 한 번만 공유해줘도 팀원들이 안심합니다."],
      SPFC: ["빠른 지원군형", "빠르게 지원하고 바로 공유. 팀플의 윤활유", "팀플에 꼭 필요한 존재입니다. 자신감 가지세요."],
      SPFI: ["조용한 실무형", "조용히 빠르게 처리. 팀플계의 닌자", "카톡 한 줄만 더 보내도 팀원들이 살아납니다."],
      SEQC: ["팀플의 기둥형", "실행하면서 꼼꼼하고 소통도 잘함. 팀플의 기둥", "기획 단계에서도 의견 내보세요. 잘 하실 거예요."],
      SEQI: ["혼자 꼼꼼히 처리하는형", "혼자 꼼꼼히 해오는 묵묵한 실행가", "공유 한 번만 더. 팀원들이 당신 믿고 있어요."],
      SEFC: ["빠르고 협조적인 실행형", "빠르고 협조적. 팀플의 속도원툴", "팀플계의 숨은 MVP입니다. 계속 이렇게 해주세요."],
      SEFI: ["묵묵한 실행머신형", "묵묵히 빠르게 혼자 처리. 팀플계의 기계", "존재만으로도 팀에 기여 중입니다. 말만 조금 더."]
    };

    const storageKey = "tpqi-team-results";
    const state = {
      name: "",
      index: 0,
      answers: [],
      lastResult: null,
      team: loadTeam()
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const screens = {
      home: $("#homeScreen"),
      quiz: $("#quizScreen"),
      result: $("#resultScreen"),
      team: $("#teamScreen")
    };

    $("#startForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const name = $("#nameInput").value.trim();
      if (!name) {
        toast("이름을 입력해주세요.");
        $("#nameInput").focus();
        return;
      }
      startQuiz(name);
    });

    $$(".choice-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const answer = button.dataset.answer === "true";
        selectAnswer(answer);
      });
    });

    $("#prevQuestion").addEventListener("click", () => {
      if (state.index === 0) {
        showScreen("home");
        return;
      }
      state.index -= 1;
      renderQuestion();
    });

    $("#addMember").addEventListener("click", resetToHome);
    $("#addMemberFromTeam").addEventListener("click", resetToHome);
    $("#openTeamFromHome").addEventListener("click", () => {
      renderTeamReport();
      showScreen("team");
    });
    $("#openTeamFromResult").addEventListener("click", () => {
      renderTeamReport();
      showScreen("team");
    });
    $("#clearAllFromHome").addEventListener("click", clearTeam);
    $("#clearAllFromTeam").addEventListener("click", clearTeam);

    function startQuiz(name) {
      state.name = name;
      state.index = 0;
      state.answers = new Array(questions.length);
      $("#quizName").textContent = `${name} 진단`;
      renderQuestion();
      showScreen("quiz");
    }

    function selectAnswer(answer) {
      state.answers[state.index] = answer;
      $$(".choice-btn").forEach((button) => {
        button.classList.toggle("selected", button.dataset.answer === String(answer));
      });

      window.setTimeout(() => {
        if (state.index < questions.length - 1) {
          state.index += 1;
          renderQuestion();
        } else {
          finishDiagnosis();
        }
      }, 160);
    }

    function renderQuestion() {
      const question = questions[state.index];
      const axis = axes.find((item) => item.key === question.axis);
      const savedAnswer = state.answers[state.index];
      const percent = ((state.index + 1) / questions.length) * 100;

      $("#progressText").textContent = `Q${state.index + 1} / ${questions.length}`;
      $("#progressBar").style.width = `${percent}%`;
      $("#axisChip").textContent = `${axis.title} · ${axis.aKorean} / ${axis.bKorean}`;
      $("#questionText").textContent = question.text;
      $$(".choice-btn").forEach((button) => {
        button.classList.toggle("selected", button.dataset.answer === String(savedAnswer));
      });
    }

    function finishDiagnosis() {
      const result = diagnose(state.name, state.answers);
      state.lastResult = result;
      state.team.push(result);
      saveTeam();
      renderResult(result);
      renderSharedLists();
      showScreen("result");
    }

    function diagnose(name, answers) {
      const aScores = [0, 0, 0, 0];
      const bScores = [0, 0, 0, 0];

      questions.forEach((question, index) => {
        if (!answers[index]) return;
        const axisIndex = axes.findIndex((axis) => axis.key === question.axis);
        if (question.isA) aScores[axisIndex] += 1;
        else bScores[axisIndex] += 1;
      });

      const typeCode = axes.map((axis, index) => (
        aScores[index] >= bScores[index] ? axis.aCode : axis.bCode
      )).join("");

      return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name,
        typeCode,
        aScores,
        bScores,
        createdAt: new Date().toISOString()
      };
    }

    function renderResult(result) {
      const copy = getTypeCopy(result.typeCode);
      $("#resultCode").textContent = result.typeCode;
      $("#resultName").textContent = copy[0];
      $("#resultComment").textContent = copy[1];
      $("#resultPerson").textContent = result.name;
      $("#resultTip").textContent = copy[2];

      $("#axisList").innerHTML = axes.map((axis, index) => {
        const code = result.typeCode[index];
        const korean = code === axis.aCode ? axis.aKorean : axis.bKorean;
        const total = result.aScores[index] + result.bScores[index];
        const ratio = total === 0 ? 50 : Math.round((result.aScores[index] / total) * 100);
        return `
          <article class="axis-row">
            <div class="axis-head">
              <div>
                <small>${axis.title}</small>
                <strong>${axis.aKorean}(${axis.aCode}) vs ${axis.bKorean}(${axis.bCode})</strong>
              </div>
              <b>${korean} · ${code}</b>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${ratio}%; background:${axis.color}"></div>
            </div>
            <div class="axis-labels">
              <span>${axis.aCode} ${result.aScores[index]}</span>
              <span>${result.bScores[index]} ${axis.bCode}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTeamReport() {
      const size = state.team.length;
      const rate = size >= 2 ? calcSurvivalRate() : 0;
      $("#rateRing").style.setProperty("--rate", `${rate}%`);
      $("#survivalRate").textContent = `${rate}%`;
      $("#teamHeadline").textContent = size >= 2 ? `${size}명 팀 분석 완료` : "팀원 분석 대기 중";
      $("#teamComment").textContent = size >= 2 ? getTeamComment(rate) : "팀원 2명 이상이면 최종 리포트가 완성됩니다.";

      $("#memberList").innerHTML = size
        ? state.team.map(renderMemberRow).join("")
        : `<div class="empty">아직 저장된 진단 결과가 없습니다.</div>`;
      renderSharedLists();
    }

    function renderSharedLists() {
      $("#teamCount").textContent = `${state.team.length}명`;
      $("#sideMemberList").innerHTML = state.team.length
        ? state.team.slice(-5).reverse().map(renderMemberRow).join("")
        : `<div class="empty">진단 후 기록이 표시됩니다.</div>`;
    }

    function renderMemberRow(result) {
      const copy = getTypeCopy(result.typeCode);
      return `
        <article class="member-row">
          <div class="member-head">
            <div>
              <small>${copy[0]}</small>
              <strong>${escapeHtml(result.name)}</strong>
            </div>
            <b>${result.typeCode}</b>
          </div>
        </article>
      `;
    }

    function calcSurvivalRate() {
      const size = state.team.length;
      if (size === 0) return 0;

      let communicatorCount = 0;
      let leaderCount = 0;
      state.team.forEach((result) => {
        if (result.typeCode.charAt(3) === "C") communicatorCount += 1;
        if (result.typeCode.charAt(0) === "L") leaderCount += 1;
      });

      const commRate = Math.trunc((communicatorCount / size) * 50);
      const leaderRate = leaderCount === 0 ? 0 : leaderCount === 1 ? 30 : 15;
      return Math.min(commRate + leaderRate + 20, 100);
    }

    function getTeamComment(rate) {
      if (rate >= 80) return "드림팀입니다. 다음 팀플 때도 어떻게든 꼬시세요.";
      if (rate >= 60) return "그럭저럭 굴러가는 팀. 하지만 힘들어하는 누군가 한 명쯤은 있을 것 같군요.";
      if (rate >= 40) return "팀플인지 생존게임인지 불분명합니다.";
      if (rate >= 20) return "해체하는 것을 진지하게 고려해보세요.";
      return "답 없습니다. 각자 도생하세요.";
    }

    function getTypeCopy(typeCode) {
      return typeCopy[typeCode] || ["알 수 없는 유형", "분류 불가", "팀원들과 대화를 늘려보세요."];
    }

    function showScreen(name) {
      Object.entries(screens).forEach(([key, screen]) => {
        screen.classList.toggle("active", key === name);
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetToHome() {
      $("#nameInput").value = "";
      showScreen("home");
      window.setTimeout(() => $("#nameInput").focus(), 120);
    }

    function clearTeam() {
      if (!state.team.length) {
        toast("초기화할 기록이 없습니다.");
        return;
      }
      state.team = [];
      state.lastResult = null;
      saveTeam();
      renderSharedLists();
      renderTeamReport();
      toast("진단 기록을 초기화했습니다.");
    }

    function loadTeam() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        return [];
      }
    }

    function saveTeam() {
      localStorage.setItem(storageKey, JSON.stringify(state.team));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    let toastTimer = 0;
    function toast(message) {
      const toastEl = $("#toast");
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    renderSharedLists();
  </script>
</body>
</html>
